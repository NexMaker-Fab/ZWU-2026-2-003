<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式 - 邱佳慧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f8fafb;
            color: #2c3e50;
            line-height: 1.6;
        }

        /* 导航栏 */
        nav {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 10px rgba(58, 124, 165, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 500;
            color: #3a7ca5;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .lang-switch {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid #3a7ca5;
            border-radius: 20px;
            color: #3a7ca5;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .lang-switch:hover {
            background: #3a7ca5;
            color: white;
        }

        .nav-menu a {
            text-decoration: none;
            color: #5a7a8a;
            font-size: 16px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #3a7ca5;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #3a7ca5;
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* 页面标题 */
        .page-header {
            padding: 80px 0 60px;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4edf5 100%);
            text-align: center;
        }

        .page-title {
            font-size: 42px;
            font-weight: 300;
            color: #3a7ca5;
            margin-bottom: 16px;
        }

        .page-subtitle {
            font-size: 18px;
            color: #5a9bb5;
        }

        /* 联系信息区域 */
        .contact-section {
            padding: 80px 0;
        }

        .section-title {
            font-size: 32px;
            font-weight: 300;
            color: #3a7ca5;
            text-align: center;
            margin-bottom: 60px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .contact-card {
            background: white;
            padding: 40px 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(58, 124, 165, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(58, 124, 165, 0.12);
        }

        .contact-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .contact-label {
            font-size: 16px;
            color: #7a8a9a;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .contact-value {
            font-size: 18px;
            color: #3a7ca5;
            font-weight: 500;
        }

        /* 联系表单 */
        .form-section {
            padding: 80px 0;
            background-color: white;
        }

        .contact-form {
            max-width: 700px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            color: #3a7ca5;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8f4f8;
            border-radius: 6px;
            font-size: 15px;
            color: #2c3e50;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #5a9bb5;
        }

        .form-textarea {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5a9bb5 0%, #3a7ca5 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 124, 165, 0.25);
        }

        /* 社交媒体 */
        .social-section {
            padding: 60px 0;
            text-align: center;
        }

        .social-title {
            font-size: 24px;
            color: #3a7ca5;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            padding: 16px 32px;
            background: white;
            border-radius: 6px;
            color: #5a9bb5;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(58, 124, 165, 0.08);
        }

        .social-link:hover {
            background: #e8f4f8;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(58, 124, 165, 0.15);
        }

        /* 页脚 */
        footer {
            padding: 40px 0;
            text-align: center;
            background-color: #e8f4f8;
            color: #5a9bb5;
            font-size: 14px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .nav-container {
                padding: 0 20px;
            }

            .nav-menu {
                gap: 20px;
            }

            .page-header {
                padding: 60px 0 40px;
            }

            .page-title {
                font-size: 32px;
            }

            .contact-section,
            .form-section {
                padding: 60px 0;
            }

            .section-title {
                font-size: 28px;
                margin-bottom: 40px;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="portfolio.html" class="nav-logo">邱佳慧</a>
            <ul class="nav-menu">
                <li><a href="portfolio.html" data-zh="关于我" data-en="About">关于我</a></li>
                <li><a href="works.html" data-zh="作品集" data-en="Portfolio">作品集</a></li>
                <li><a href="contact.html" class="active" data-zh="联系方式" data-en="Contact">联系方式</a></li>
                <li><button class="lang-switch" onclick="toggleLanguage()">EN</button></li>
            </ul>
        </div>
    </nav>

    <!-- 页面标题 -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title" data-zh="联系方式" data-en="Contact">联系方式</h1>
            <p class="page-subtitle" data-zh="期待与您的交流与合作" data-en="Looking forward to communication and collaboration">期待与您的交流与合作</p>
        </div>
    </header>

    <!-- 联系信息区域 -->
    <section class="contact-section">
        <div class="container">
            <h2 class="section-title" data-zh="联系我" data-en="Get in Touch">联系我</h2>
            
            <div class="contact-grid">
                <div class="contact-card">
                    <div class="contact-icon">📧</div>
                    <div class="contact-label" data-zh="邮箱" data-en="Email">邮箱</div>
                    <div class="contact-value">874154700@qq.com</div>
                </div>

                <div class="contact-card">
                    <div class="contact-icon">📱</div>
                    <div class="contact-label" data-zh="电话" data-en="Phone">电话</div>
                    <div class="contact-value">17858940633</div>
                </div>

                <div class="contact-card">
                    <div class="contact-icon">💬</div>
                    <div class="contact-label" data-zh="微信" data-en="WeChat">微信</div>
                    <div class="contact-value">kakei_ovo</div>
                </div>

                <div class="contact-card">
                    <div class="contact-icon">📍</div>
                    <div class="contact-label" data-zh="地址" data-en="Location">地址</div>
                    <div class="contact-value" data-zh="中国 · 宁波" data-en="Ningbo, China">中国 · 宁波</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系表单 -->
    <section class="form-section">
        <div class="container">
            <h2 class="section-title" data-zh="发送消息" data-en="Send Message">发送消息</h2>
            
            <form class="contact-form">
                <div class="form-group">
                    <label class="form-label" data-zh="姓名" data-en="Name">姓名</label>
                    <input type="text" class="form-input" placeholder="请输入您的姓名" data-placeholder-zh="请输入您的姓名" data-placeholder-en="Enter your name">
                </div>

                <div class="form-group">
                    <label class="form-label" data-zh="邮箱" data-en="Email">邮箱</label>
                    <input type="email" class="form-input" placeholder="请输入您的邮箱" data-placeholder-zh="请输入您的邮箱" data-placeholder-en="Enter your email">
                </div>

                <div class="form-group">
                    <label class="form-label" data-zh="主题" data-en="Subject">主题</label>
                    <input type="text" class="form-input" placeholder="请输入消息主题" data-placeholder-zh="请输入消息主题" data-placeholder-en="Enter message subject">
                </div>

                <div class="form-group">
                    <label class="form-label" data-zh="消息内容" data-en="Message">消息内容</label>
                    <textarea class="form-textarea" placeholder="请输入您的消息内容..." data-placeholder-zh="请输入您的消息内容..." data-placeholder-en="Enter your message..."></textarea>
                </div>

                <button type="submit" class="submit-btn" data-zh="发送消息" data-en="Send Message">发送消息</button>
            </form>
        </div>
    </section>

    <!-- 社交媒体 -->
    <section class="social-section">
        <div class="container">
            <h2 class="social-title" data-zh="关注我" data-en="Follow Me">关注我</h2>
            <div class="social-links">
                <a href="#" class="social-link">Behance</a>
                <a href="#" class="social-link">Dribbble</a>
                <a href="#" class="social-link">Instagram</a>
                <a href="#" class="social-link">LinkedIn</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 邱佳慧. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 语言切换功能
        let currentLang = 'zh';

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            const langSwitch = document.querySelector('.lang-switch');
            langSwitch.textContent = currentLang === 'zh' ? 'EN' : '中文';

            // 更新文本内容
            const elements = document.querySelectorAll('[data-zh][data-en]');
            elements.forEach(el => {
                el.textContent = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
            });

            // 更新 placeholder
            const inputs = document.querySelectorAll('[data-placeholder-zh][data-placeholder-en]');
            inputs.forEach(input => {
                input.placeholder = currentLang === 'zh' ? input.getAttribute('data-placeholder-zh') : input.getAttribute('data-placeholder-en');
            });

            localStorage.setItem('preferredLang', currentLang);
        }

        window.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferredLang');
            if (savedLang && savedLang !== 'zh') {
                currentLang = savedLang;
                const langSwitch = document.querySelector('.lang-switch');
                langSwitch.textContent = currentLang === 'zh' ? 'EN' : '中文';

                const elements = document.querySelectorAll('[data-zh][data-en]');
                elements.forEach(el => {
                    el.textContent = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
                });

                const inputs = document.querySelectorAll('[data-placeholder-zh][data-placeholder-en]');
                inputs.forEach(input => {
                    input.placeholder = currentLang === 'zh' ? input.getAttribute('data-placeholder-zh') : input.getAttribute('data-placeholder-en');
                });
            }
        });
    </script>
</body>
</html>

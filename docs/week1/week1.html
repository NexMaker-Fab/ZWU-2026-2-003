<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 1 - 网页搭建</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" id="goHome">课程系统</div>
            <ul class="nav-menu">
                <li class="nav-item" data-page="home">Home</li>
                <li class="nav-item has-dropdown active" data-page="homework">
                    <span>作业</span>
                    <div class="dropdown">
                        <div class="dropdown-weeks">
                            <button class="week-btn active" data-week="1">Week 1</button>
                            <button class="week-btn" data-week="2">Week 2</button>
                            <button class="week-btn" data-week="3">Week 3</button>
                            <button class="week-btn" data-week="4">Week 4</button>
                            <button class="week-btn" data-week="5">Week 5</button>
                            <button class="week-btn" data-week="6">Week 6</button>
                            <button class="week-btn" data-week="7">Week 7</button>
                            <button class="week-btn" data-week="8">Week 8</button>
                            <button class="week-btn" data-week="9">Week 9</button>
                            <button class="week-btn" data-week="10">Week 10</button>
                        </div>
                    </div>
                </li>
                <li class="nav-item" data-page="project">项目</li>
                <li class="nav-item" data-page="team">团队介绍</li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <section class="page active">
            <div class="homework-header">
                <div class="week-badge">Week 1</div>
                <h1 class="week-title">网页搭建</h1>
                <div class="title-divider"></div>
            </div>

            <div class="content-section">
                <p style="text-align: center; color: #999; padding: 40px;">Week 1 内容待添加...</p>
            </div>
        </section>
    </main>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    const navItems = document.querySelectorAll('.nav-item');
    const weekBtns = document.querySelectorAll('.week-btn');
    const goHome = document.getElementById('goHome');

    if (goHome) {
        goHome.addEventListener('click', () => {
            window.location.href = '../../index.html';
        });
    }

    navItems.forEach((item) => {
        item.addEventListener('click', () => {
            const page = item.dataset.page;
            if (!page || page === 'homework') {
                return;
            }
            window.location.href = '../../index.html';
        });
    });

    weekBtns.forEach((btn) => {
        btn.addEventListener('click', (event) => {
            event.stopPropagation();
            const week = Number.parseInt(btn.dataset.week, 10);
            if (week === 1) {
                window.location.href = 'week1.html';
                return;
            }
            if (week === 2) {
                window.location.href = '../week2/week2.html';
                return;
            }
            if (week === 3) {
                window.location.href = '../week3/week3.html';
                return;
            }
            window.location.href = '../../index.html';
        });
    });
});
    </script>
</body>
</html>

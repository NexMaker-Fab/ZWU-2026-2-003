<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niki JIANG - Personal Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #E8ECEF 0%, #D4DDE5 100%);
            color: #4A5568;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #E8ECEF 0%, #C5D1DC 100%);
            position: relative;
        }

        .hero-content {
            text-align: center;
        }

        #typewriter {
            font-size: 3rem;
            font-weight: 700;
            color: #4A5568;
            min-height: 80px;
            letter-spacing: 2px;
        }

        /* 光标闪烁效果 */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background-color: #4A5568;
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Info Section */
        .info-section {
            padding: 80px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Info Card */
        .info-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(74, 85, 104, 0.1);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(50px);
        }

        .info-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(74, 85, 104, 0.15);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .info-card h2 {
            font-size: 1.8rem;
            color: #4A5568;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .card-content {
            font-size: 1.1rem;
            color: #718096;
            line-height: 1.6;
        }

        .email-link {
            color: #A8B5C5;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .email-link:hover {
            color: #4A5568;
        }

        /* Hobby Tags */
        .hobby-tags {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            background: linear-gradient(135deg, #A8B5C5 0%, #B8C5D1 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: default;
        }

        .tag:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(168, 181, 197, 0.4);
        }

        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .skill-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(5px);
        }

        .skill-name {
            display: block;
            font-size: 0.95rem;
            color: #4A5568;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .skill-bar {
            width: 100%;
            height: 8px;
            background: #D4DDE5;
            border-radius: 10px;
            overflow: hidden;
        }

        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #A8B5C5 0%, #B8C5D1 100%);
            border-radius: 10px;
            transition: width 1s ease-out;
        }

        /* 滚动渐显动画 */
        .scroll-reveal {
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #typewriter {
                font-size: 2rem;
            }

            .info-section {
                padding: 60px 15px;
            }

            .info-card {
                padding: 25px;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .hobby-tags {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            #typewriter {
                font-size: 1.5rem;
            }

            .info-card h2 {
                font-size: 1.5rem;
            }

            .card-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 id="typewriter"></h1>
        </div>
    </section>

    <!-- Info Section -->
    <section class="info-section">
        <div class="container">
            <!-- Education Card -->
            <div class="info-card scroll-reveal">
                <div class="card-icon">🎓</div>
                <h2>Education</h2>
                <p class="card-content">DT(2+2)24A2, Zhejiang Wanli University</p>
            </div>

            <!-- Contact Card -->
            <div class="info-card scroll-reveal">
                <div class="card-icon">📧</div>
                <h2>Contact</h2>
                <a href="mailto:2642811355@qq.com" class="card-content email-link">
                    2642811355@qq.com
                </a>
            </div>

            <!-- Hobbies Card -->
            <div class="info-card scroll-reveal">
                <div class="card-icon">✨</div>
                <h2>Hobbies</h2>
                <div class="hobby-tags">
                    <span class="tag">🎮 Gaming</span>
                    <span class="tag">📚 Reading</span>
                    <span class="tag">✈️ Traveling</span>
                </div>
            </div>

            <!-- Skills Card -->
            <div class="info-card scroll-reveal">
                <div class="card-icon">💡</div>
                <h2>Skills</h2>
                <div class="skills-grid">
                    <div class="skill-item">
                        <span class="skill-name">Adobe Illustrator</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 85%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">After Effects</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 80%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">Audition</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 75%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">Photoshop</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 90%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">Arduino IDE</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 70%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">Capcut</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 85%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 打字机效果
        const typewriterText = "Hello, I'm Niki JIANG";
        const typewriterElement = document.getElementById('typewriter');
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < typewriterText.length) {
                typewriterElement.innerHTML = typewriterText.substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriter, 80); // 每个字符延迟80ms
            } else {
                // 打字完成后移除光标
                typewriterElement.innerHTML = typewriterText;
            }
        }

        // 页面加载后开始打字效果
        window.addEventListener('load', () => {
            setTimeout(typeWriter, 500); // 延迟500ms开始打字
        });

        // 滚动渐显动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    // 添加延迟以实现stagger效果
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 100);
                    
                    // 只触发一次
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // 观察所有需要滚动动画的元素
        document.querySelectorAll('.scroll-reveal').forEach((element) => {
            observer.observe(element);
        });

        // 平滑滚动效果
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
